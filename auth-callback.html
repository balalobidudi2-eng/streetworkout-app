<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirection — Street Workout</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .cb-card { text-align:center; padding:40px; }
    .spinner { width:40px; height:40px; border:4px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="cb-card">
    <div class="spinner"></div>
    <p>Connexion en cours...</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabase-config.js"></script>
  <script>
    (async function() {
      if (!SB) { window.location.href = 'login.html'; return; }
      var result = await SB.auth.getSession();
      if (result.data.session) {
        window.location.href = 'dashboard.html';
      } else {
        window.location.href = 'login.html';
      }
    })();
  </script>
</body>
</html>
