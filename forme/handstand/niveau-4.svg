<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect fill="#0f172a" width="200" height="200" rx="16"/>
  <!-- Wall -->
  <line x1="145" y1="20" x2="145" y2="170" stroke="#334155" stroke-width="4"/>
  <!-- Person HSPU against wall -->
  <circle cx="100" cy="90" r="10" fill="#7C3AED"/>
  <!-- Arms bent (going down) -->
  <line x1="95" y1="95" x2="85" y2="125" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
  <line x1="105" y1="95" x2="115" y2="125" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
  <!-- Elbow bend indicators -->
  <line x1="85" y1="125" x2="90" y2="135" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
  <line x1="115" y1="125" x2="110" y2="135" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
  <!-- Torso up -->
  <line x1="100" y1="80" x2="105" y2="50" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
  <!-- Legs against wall -->
  <line x1="105" y1="50" x2="140" y2="40" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
  <line x1="105" y1="50" x2="140" y2="50" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
  <!-- Arrow down -->
  <line x1="100" y1="100" x2="100" y2="115" stroke="#f97316" stroke-width="2" stroke-dasharray="3"/>
  <polygon points="95,113 100,120 105,113" fill="#f97316"/>
  <!-- Ground -->
  <line x1="30" y1="140" x2="170" y2="140" stroke="#334155" stroke-width="2"/>
  <text x="100" y="160" text-anchor="middle" fill="#64748b" font-size="11" font-family="Inter,sans-serif">HSPU au mur</text>
  <text x="100" y="194" text-anchor="middle" fill="#7C3AED" font-size="12" font-weight="bold" font-family="Inter,sans-serif">Niveau 4</text>
</svg>
