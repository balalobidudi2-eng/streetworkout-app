<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect fill="#0f172a" width="200" height="200" rx="16"/>
  <!-- Wall -->
  <line x1="145" y1="20" x2="145" y2="170" stroke="#334155" stroke-width="4"/>
  <!-- Person handstand against wall -->
  <circle cx="105" cy="75" r="10" fill="#7C3AED"/>
  <!-- Arms straight down -->
  <line x1="100" y1="80" x2="95" y2="130" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
  <line x1="110" y1="80" x2="115" y2="130" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
  <!-- Torso straight up -->
  <line x1="105" y1="65" x2="108" y2="40" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
  <!-- Legs vertical touching wall -->
  <line x1="108" y1="40" x2="140" y2="30" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
  <line x1="108" y1="40" x2="140" y2="40" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
  <!-- Ground -->
  <line x1="30" y1="135" x2="170" y2="135" stroke="#334155" stroke-width="2"/>
  <text x="100" y="158" text-anchor="middle" fill="#64748b" font-size="11" font-family="Inter,sans-serif">Tendu au mur</text>
  <text x="100" y="194" text-anchor="middle" fill="#7C3AED" font-size="12" font-weight="bold" font-family="Inter,sans-serif">Niveau 3</text>
</svg>
