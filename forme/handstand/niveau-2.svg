<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect fill="#0f172a" width="200" height="200" rx="16"/>
  <!-- Wall -->
  <line x1="160" y1="30" x2="160" y2="170" stroke="#334155" stroke-width="4"/>
  <!-- Person kick-up against wall -->
  <circle cx="110" cy="90" r="10" fill="#7C3AED"/>
  <!-- Arms -->
  <line x1="110" y1="95" x2="105" y2="130" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
  <line x1="110" y1="95" x2="115" y2="130" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
  <!-- Torso vertical -->
  <line x1="110" y1="80" x2="115" y2="55" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
  <!-- Legs up against wall -->
  <line x1="115" y1="55" x2="155" y2="45" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
  <line x1="115" y1="55" x2="155" y2="60" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
  <!-- Ground -->
  <line x1="30" y1="135" x2="170" y2="135" stroke="#334155" stroke-width="2"/>
  <text x="100" y="158" text-anchor="middle" fill="#64748b" font-size="11" font-family="Inter,sans-serif">Kick-up mur</text>
  <text x="100" y="194" text-anchor="middle" fill="#7C3AED" font-size="12" font-weight="bold" font-family="Inter,sans-serif">Niveau 2</text>
</svg>
