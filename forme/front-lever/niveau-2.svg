<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect fill="#0f172a" width="200" height="200" rx="16"/>
  <line x1="40" y1="60" x2="160" y2="60" stroke="#334155" stroke-width="6" stroke-linecap="round"/>
  <circle cx="100" cy="80" r="10" fill="#3B82F6"/>
  <!-- Arms gripping bar -->
  <line x1="100" y1="85" x2="85" y2="65" stroke="#3B82F6" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="85" x2="115" y2="65" stroke="#3B82F6" stroke-width="3" stroke-linecap="round"/>
  <!-- Torso angled -->
  <line x1="100" y1="90" x2="115" y2="110" stroke="#3B82F6" stroke-width="3" stroke-linecap="round"/>
  <!-- Tucked legs -->
  <line x1="115" y1="110" x2="105" y2="120" stroke="#3B82F6" stroke-width="3" stroke-linecap="round"/>
  <line x1="115" y1="110" x2="125" y2="120" stroke="#3B82F6" stroke-width="3" stroke-linecap="round"/>
  <!-- Knee bend -->
  <line x1="105" y1="120" x2="100" y2="105" stroke="#3B82F6" stroke-width="3" stroke-linecap="round"/>
  <line x1="125" y1="120" x2="120" y2="105" stroke="#3B82F6" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="155" text-anchor="middle" fill="#64748b" font-size="11" font-family="Inter,sans-serif">Tuck</text>
  <text x="100" y="194" text-anchor="middle" fill="#3B82F6" font-size="12" font-weight="bold" font-family="Inter,sans-serif">Niveau 2</text>
</svg>
