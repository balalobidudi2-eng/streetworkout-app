<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect fill="#0f172a" width="200" height="200" rx="16"/>
  <!-- Bar -->
  <line x1="40" y1="60" x2="160" y2="60" stroke="#334155" stroke-width="6" stroke-linecap="round"/>
  <!-- Body hanging -->
  <circle cx="100" cy="80" r="10" fill="#3B82F6"/>
  <line x1="100" y1="90" x2="100" y2="125" stroke="#3B82F6" stroke-width="3" stroke-linecap="round"/>
  <!-- Arms up -->
  <line x1="100" y1="95" x2="85" y2="65" stroke="#3B82F6" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="95" x2="115" y2="65" stroke="#3B82F6" stroke-width="3" stroke-linecap="round"/>
  <!-- Legs straight down -->
  <line x1="100" y1="125" x2="90" y2="155" stroke="#3B82F6" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="125" x2="110" y2="155" stroke="#3B82F6" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="178" text-anchor="middle" fill="#64748b" font-size="11" font-family="Inter,sans-serif">Hollow Body</text>
  <text x="100" y="194" text-anchor="middle" fill="#3B82F6" font-size="12" font-weight="bold" font-family="Inter,sans-serif">Niveau 1</text>
</svg>
