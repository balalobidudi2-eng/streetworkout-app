<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect fill="#0f172a" width="200" height="200" rx="16"/>
  <line x1="20" y1="60" x2="180" y2="60" stroke="#334155" stroke-width="6" stroke-linecap="round"/>
  <circle cx="70" cy="78" r="10" fill="#22c55e"/>
  <!-- Arms -->
  <line x1="70" y1="83" x2="55" y2="65" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
  <line x1="70" y1="83" x2="85" y2="65" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
  <!-- Torso perfectly horizontal -->
  <line x1="70" y1="82" x2="140" y2="80" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
  <!-- Legs together horizontal -->
  <line x1="140" y1="80" x2="175" y2="78" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
  <line x1="140" y1="80" x2="175" y2="82" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
  <!-- Star/sparkle -->
  <text x="175" y="70" fill="#22c55e" font-size="14">&#9733;</text>
  <text x="100" y="140" text-anchor="middle" fill="#64748b" font-size="11" font-family="Inter,sans-serif">Full Front Lever</text>
  <text x="100" y="194" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="bold" font-family="Inter,sans-serif">Niveau 5</text>
</svg>
