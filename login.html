<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Street Workout</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/pages/login.css">
</head>
<body>

  <div class="login-page">
    <div class="login-bg">
      <div class="hero-shape hero-shape-1"></div>
      <div class="hero-shape hero-shape-2"></div>
    </div>

    <div class="login-card card-glass">
      <div class="login-logo">
        <div class="login-logo-text">SW</div>
        <div class="login-logo-sub">Street Workout Tracker</div>
      </div>

      <!-- Auth Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Connexion</button>
        <button class="auth-tab" data-tab="signup">Inscription</button>
      </div>

      <!-- ── Panel Connexion ── -->
      <div class="auth-panel active" id="panel-login">
        <div class="login-error" id="login-error"></div>

        <form id="login-form" autocomplete="off">
          <div class="form-group">
            <div class="form-input-icon">
              <span class="icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <rect x="2" y="4" width="20" height="16" rx="2"/>
                  <path d="M22 7l-10 7L2 7"/>
                </svg>
              </span>
              <input type="email" id="login-email" class="form-input" placeholder="Email" autocomplete="email" required>
            </div>
          </div>
          <div class="form-group">
            <div class="form-input-icon">
              <span class="icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
              </span>
              <input type="password" id="login-password" class="form-input" placeholder="Mot de passe" autocomplete="current-password" required>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" id="login-submit">
            <span class="btn-text">Se connecter</span>
          </button>
        </form>

        <!-- Google OAuth -->
        <div class="auth-divider"><span>ou</span></div>
        <button class="btn btn-google" id="google-login-btn">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continuer avec Google
        </button>
      </div>

      <!-- ── Panel Inscription ── -->
      <div class="auth-panel" id="panel-signup">
        <div class="login-error" id="signup-error"></div>
        <div class="signup-success" id="signup-success"></div>

        <form id="signup-form" autocomplete="off">
          <div class="form-group">
            <div class="form-input-icon">
              <span class="icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                  <circle cx="12" cy="7" r="4"/>
                </svg>
              </span>
              <input type="text" id="signup-prenom" class="form-input" placeholder="Prénom" autocomplete="given-name" required>
            </div>
          </div>
          <div class="form-group">
            <div class="form-input-icon">
              <span class="icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <rect x="2" y="4" width="20" height="16" rx="2"/>
                  <path d="M22 7l-10 7L2 7"/>
                </svg>
              </span>
              <input type="email" id="signup-email" class="form-input" placeholder="Email" autocomplete="email" required>
            </div>
          </div>
          <div class="form-group">
            <div class="form-input-icon">
              <span class="icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
              </span>
              <input type="password" id="signup-password" class="form-input" placeholder="Mot de passe (6+ caractères)" autocomplete="new-password" required minlength="6">
            </div>
          </div>
          <div class="form-group">
            <div class="form-input-icon">
              <span class="icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
              </span>
              <input type="password" id="signup-confirm" class="form-input" placeholder="Confirmer le mot de passe" autocomplete="new-password" required>
            </div>
          </div>
          <button type="submit" class="btn btn-primary">
            <span class="btn-text">Créer mon compte</span>
          </button>
        </form>
      </div>

      <div class="login-footer">
        <a href="index.html">← Retour à l'accueil</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      initLoginForm();
    });
  </script>
</body>
</html>
